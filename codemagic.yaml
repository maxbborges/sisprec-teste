workflows:
  ios-capacitor-workflow:
    name: iOS Build (Capacitor - App Store)
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Code-magic
    environment:
      vars:
        BUNDLE_ID: "br.org.sestsenat.sisprec"
    scripts:
      - name: Install Dependencies
        script: npm install --legacy-peer-deps
      - name: Build Web App (Angular)
        script: npm run build:hom
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up Code Signing
        script: |
          keychain initialize
          echo "$CM_CERTIFICATE" | tr -d '\n ' | base64 --decode > /tmp/certificate.p12
          echo "$CM_PROVISIONING_PROFILE" | tr -d '\n ' | base64 --decode > /tmp/profile.mobileprovision
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          xcode-project use-profiles
      - name: Increment Build Number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER))
      - name: Build iOS Native
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App \
            --opts="-allowProvisioningUpdates CODE_SIGN_STYLE=Manual"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - maxwellbezerra@sestsenat.org.br