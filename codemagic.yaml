workflows:
  ios-capacitor-workflow:
    name: iOS Build (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "br.org.sestsenat.sisprec"
    scripts:
      - name: Install Dependencies
        script: npm install --legacy-peer-deps
      - name: Build Web App (Angular)
        script: npm run build:hom
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up Code Signing
        script: |
          keychain initialize
          
          # Decodifica o certificado e o profile que você subiu no painel
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          
          # Instala o certificado (Certifique-se que a variável CM_CERTIFICATE_PASSWORD existe no painel)
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # Registra o profile no sistema e GERA o ExportOptions.plist automaticamente
          xcode-project use-profiles
      - name: Build iOS Native
        script: |
          # O build-ipa agora encontrará o ExportOptions.plist gerado pelo comando anterior
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - maxwellbezerra@sestsenat.org.br