workflows:
  ios-capacitor-workflow:
    name: iOS Build (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Code-magic # Confirme se no painel está com este hífen
    environment:
      vars:
        BUNDLE_ID: "br.org.sestsenat.sisprec"
    scripts:
      - name: Install Dependencies
        script: npm install --legacy-peer-deps
      - name: Build Web App (Angular)
        script: npm run build:hom
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up Code Signing
        script: |
          # Inicializa o chaveiro e busca os certificados corretamente
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_DEVELOPMENT --create
          keychain add-certificates
      - name: Build iOS Native
        script: |
          # Gera o .ipa usando os arquivos baixados no passo anterior
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - maxwellbezerra@sestsenat.org.br