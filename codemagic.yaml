workflows:
  ios-capacitor-workflow:
    name: iOS Build (Capacitor - App Store)
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Code-magic
    environment:
      groups: 
        - chaves
      vars:
        BUNDLE_ID: "br.org.sestsenat.sisprec"
        APP_STORE_APPLE_ID: "6760365847"
        WORKSPACE: "ios/App/App.xcodeproj"
    scripts:
      #- name: Install Dependencies
      #  script: npm install --legacy-peer-deps
      #- name: Build Web App (Angular)
      #  script: npm run build:hom
      #- name: Sync Capacitor
      #  script: npx cap sync ios
      - name: Set up Code Signing
        script: |
          keychain initialize
          keychain add-certificates
          ls -la keys/getec_sisprec.p12
          cp "keys/getec_sisprec.p12" "/Users/builder/Library/MobileDevice/Certificates/getec_sisprec.p12"
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          xcode-project use-profiles
      - name: Increment Build Number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build iOS Native
        script: |
          xcode-project build-ipa \
                      --project "$WORKSPACE" \
                      --scheme "App" \
                      --bundle-id "$BUNDLE_ID" \
                      --type app-store
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - maxwellbezerra@sestsenat.org.br