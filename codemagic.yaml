workflows:
  ios-capacitor-workflow:
    name: iOS Build (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "br.org.sestsenat.sisprec"
    scripts:
      - name: Install Dependencies
        script: npm install --legacy-peer-deps
      - name: Build Web App (Angular)
        script: npm run build:hom
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up Code Signing
        script: |
          keychain initialize
          
          # Decodifica o certificado e o profile que você subiu no painel
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          
          # Instala o certificado no chaveiro
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"
          
          # Instala o profile no local correto do macOS
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Gera o ExportOptions.plist necessário para o archive
          xcode-project use-profiles
      - name: Build iOS Native
        script: |
          # Extraímos o UUID do perfil para passar direto para o xcodebuild
          PROVISIONING_PROFILE_UUID=$(mobile-static --profile /tmp/profile.mobileprovision --query uuid)
          
          # O build-ipa agora recebe explicitamente o mapeamento do perfil
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App \
            --bundle-id "$BUNDLE_ID" \
            --provisioning-profile "$PROVISIONING_PROFILE_UUID"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - maxwellbezerra@sestsenat.org.br