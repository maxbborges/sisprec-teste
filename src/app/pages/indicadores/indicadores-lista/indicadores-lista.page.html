<div class="card shadow mb-3">
    <h3 class="card-header bg-primary text-white">
        <i class="fas fa-list"></i>
        Indicadores
    </h3>
    <div class="card-body">
        <button
            [disabled]="carregando"
            routerLink="/admin/indicadores/novo"
            class="btn btn-success btn-block w-100">
            <i class="fas fa-plus"></i>
            Cadastrar Novo Indicador
        </button>
        <form
            [formGroup]="indicadorForm"
            (submit)="filtrar()">
            <div class="row">
                <div class="col">
                    <div class="form-group">
                        <label for="idTipo">Tipo</label>
                        <select
                            (change)="colocarValidadorEntradaOuSaida()"
                            formControlName="tipo"
                            class="form-control"
                            id="idTipo">
                            <option value="itemContaCorrente">Item conta corrente</option>
                            <option value="itemContaInvestimento">Item conta investimento</option>
                            <option value="motivo">Motivo</option>
                        </select>
                    </div>
                </div>
                <div class="col d-flex">
                    <div class="mt-auto mb-4 mx-auto">
                        <div class="custom-control custom-radio custom-control-inline">
                            <input
                                type="radio"
                                id="idEntrada"
                                formControlName="entradaOuSaida"
                                class="custom-control-input"
                                value="entrada">
                            <label
                                class="custom-control-label"
                                for="idEntrada">
                                Entrada
                            </label>
                        </div>
                        <div class="custom-control custom-radio custom-control-inline">
                            <input
                                type="radio"
                                id="idSaida"
                                formControlName="entradaOuSaida"
                                class="custom-control-input"
                                value="saida">
                            <label
                                class="custom-control-label"
                                for="idSaida">
                                Saída
                            </label>
                        </div>
                    </div>
                </div>
                <div class="col d-flex">
                    <button
                        [disabled]="carregando"
                        type="submit"
                        class="btn btn-primary btn-block w-100">
                        <i class="fas fa-filter"></i>
                        Filtrar
                    </button>
                </div>
            </div>
        </form>
        <table class="table table-bordered table-hover table-striped">
            <thead>
                <tr>
                    <th
                        scope="col"
                        class="align-middle text-center"
                        [style.width.px]="60">
                        #
                    </th>
                    <th
                        scope="col"
                        class="align-middle text-center">
                        Tipo
                    </th>
                    <th
                        scope="col"
                        class="align-middle text-center">
                        Nome
                    </th>
                    <th
                        scope="col"
                        class="align-middle text-center">
                        Status
                    </th>
                    <th
                        [style.width.px]="220"
                        scope="col"
                        class="align-middle text-center">
                        Ações
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let indicador of indicadores; let l = last;">
                    <th
                        scope="row"
                        class="align-middle text-center">
                        {{ indicador.ordem }}
                    </th>
                    <td class="align-middle text-center">{{ indicador.tipo }}</td>
                    <td class="align-middle text-center">{{ indicador.nome }}</td>
                    <td class="align-middle text-center">{{ indicador.status }}</td>
                    <td class="align-middle text-center">
                        <button
                            [disabled]="carregando"
                            [routerLink]="['/admin/indicadores', indicador.id, indicador.siglaTipo,'edicao']"
                            type="button"
                            class="btn btn-warning me-2">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button
                            [disabled]="carregando || acaoBloqueada"
                            *ngIf="indicador.ativo; else desabilitado"
                            (click)="desabilitar(indicador)"
                            type="button"
                            class="btn btn-danger me-2">
                            <i class="fas fa-power-off"></i>
                        </button>
                        <ng-template #desabilitado>
                            <button
                                [disabled]="carregando || acaoBloqueada"
                                (click)="reabilitar(indicador)"
                                type="button"
                                class="btn btn-success me-2">
                                <i class="fas fa-undo-alt"></i>
                            </button>
                        </ng-template>
                        <button
                            *ngIf="indicador.ordem !== '-' && indicador.ordem > 1"
                            [disabled]="carregando || acaoBloqueada"
                            (click)="moverCima(indicador)"
                            type="button"
                            class="btn btn-primary me-2">
                            <i class="fas fa-chevron-up"></i>
                        </button>
                        <button
                            *ngIf="indicador.ordem !== '-' && !l"
                            [disabled]="carregando || acaoBloqueada"
                            (click)="moverBaixo(indicador)"
                            type="button"
                            class="btn btn-primary">
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
