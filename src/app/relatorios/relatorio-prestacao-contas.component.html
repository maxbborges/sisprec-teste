<div class="card shadow mb-3">
    <h3 class="card-header bg-primary text-white">Relatório de Prestação de Contas</h3>
    <div class="card-body">
        <form [formGroup]="formPesquisa">
            <div class="row mb-3">
                <div class="form-group col">
                    <label for="slcExercicio">Ano</label>
                    <select
                        class="form-control"
                        id="slcExercicio"
                        formControlName="anoExercicio">
                        <option
                            selected
                            value>
                            Selecione
                        </option>
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
                <div class="form-group col">
                    <label for="slcVersao">Mês</label>
                    <select
                        class="form-control"
                        id="slcVersao"
                        formControlName="mesExercicio">
                        <option
                            selected
                            value>
                            Selecione
                        </option>
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        <option value="5">Maio</option>
                        <option value="6">Junho</option>
                        <option value="7">Julho</option>
                        <option value="8">Agosto</option>
                        <option value="9">Setembro</option>
                        <option value="10">Outubro</option>
                        <option value="11">Novembro</option>
                        <option value="12">Dezembro</option>
                    </select>
                </div>
                <div class="col d-flex">
                    <button
                        type="button"
                        class="btn btn-primary btn-block w-100"
                        (click)="gerar()">
                        <i class="fas fa-file-export"></i>
                        Gerar
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
