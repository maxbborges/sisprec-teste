<form [formGroup]="formPesquisa">
    <!--(submit)="pesquisar()-->
    <div class="card shadow mb-3">

        <h3 class="card-header bg-primary text-white">
            <i class="fas fa-file-archive"></i>
            &nbsp;&nbsp;Baixar comprovantes de Despesas e Devoluções
        </h3>
        <div class="card-body">

            <div class="row">
                <div class="form-group col">
                    <label for="slcExercicio">Exercício:</label>
                    <select class="form-control" id="slcExercicio" tabindex="1" (change)="onChangeGetCategoria()"
                        formControlName="exercicio">
                        <option [disabled]="true">Selecione</option>
                        <option value="2020">2020</option>
                        <option value="2021">2021</option>
                        <option value="2022">2022</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
            <ng-container *ngIf="disableFederacoes">
                <div class="form-group col">
                    <label for="federacaoUsuario">Federação:</label>


                    <select id="federacaoUsuario" class="form-control" formControlName="federacao">
                        <option selected>Selecione...</option>
                        <ng-container *ngFor="let federacao of lstFederacoes">
                            <option [value]="federacao.idIndicador">{{federacao?.sigla}}</option>
                        </ng-container>
                    </select>
                    <small class="form-text text-muted">
                        Selecione a federação dona do arquivo.
                    </small>

                </div>
            </ng-container>
                <div class="form-group col">
                    <label for="slcMes">Mês:</label>
                    <select id="slctMes" class="form-control" formControlName="mes">
                        <option selected>Selecione</option>
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        <option value="5">Maio</option>
                        <option value="6">Junho</option>
                        <option value="7">Julho</option>
                        <option value="8">Agosto</option>
                        <option value="9">Setembro</option>
                        <option value="10">Outubro</option>
                        <option value="11">Novembro</option>
                        <option value="12">Dezembro</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="form-group col">
                    <label for="slcItem">Categoria:</label>
                    <select class="form-control" id="slcItem" tabindex="4" formControlName="categoria"
                        (change)="onChangeGetItemCategoria()">
                        <option>Todos</option>
                        <ng-container *ngFor="let cat of lstCategorias">
                            <option [value]="cat.idCategoriaItemPlanoDeConta">{{cat?.codigo}}.{{cat?.descricao}}</option>
                        </ng-container>
                    </select>
                </div>
                <ng-container *ngIf="exibeItem">

                <div class="form-group col">
                    <label for="slcSubitem">Item:</label>
                    <select class="form-control" id="slcSubitem" tabindex="5" formControlName="item">
                        <option [disabled]="true">Todos</option>
                        <ng-container *ngFor="let item of lstItemCategorias">
                            <option [value]="item.idItemPlanoDeConta">{{item?.codigo}} {{item?.descricao}}</option>
                        </ng-container>
                    </select>
                </div>

            </ng-container>
            </div>
            <app-barra-espacamento></app-barra-espacamento>
            <div class="row">
                <div class="col">
                    <button tabindex="6" type="button" class="btn btn-block btn-primary w-100"
                        (click)="baixarArquivos()">Baixar arquivos</button>
                </div>
            </div>
            <ng-container>
                <app-barra-espacamento></app-barra-espacamento>
                <!-- <div class="row">
                    <div class="col-12">
                        <div class="alert alert-info">Não foram encontradas despesas para as opções selecionadas.</div>
                    </div>
                </div> -->
            </ng-container>
        </div>
    </div>

</form>
