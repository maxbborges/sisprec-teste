<div class="card shadow mb-3">
    <h3 class="card-header bg-primary text-white"><i class="fas fa-users"></i>&nbsp;&nbsp;Usuários</h3>
    <div class="card-body">
        <div class="row">
            <div class="col">
                <a class="btn btn-block btn-success w-100" routerLink="/administrativo/usuarios/cadastrar"><i
                        class="fas fa-user-plus"></i>&nbsp;Cadastrar novo usuário</a>
            </div>
        </div>
        <app-barra-espacamento></app-barra-espacamento>
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label for="slcPerfil">Filtrar por perfil</label>
                    <select class="form-control" id="slcPerfil" [(ngModel)]="idPerfilFiltro"
                        (change)="onChangeFiltrarIndicadoresPorTipo()">
                        <option value="0">Todos</option>
                        <ng-container *ngFor="let perfil of lstPerfis">
                            <option [value]="perfil.idIndicador">{{perfil.nome}}</option>
                        </ng-container>
                    </select>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <table class="table table-hover table-striped table-sm">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Nome</th>
                            <th scope="col">Tipo</th>
                            <th scope="col">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <ng-container *ngFor="let usuario of lstUsuariosFiltrado">
                            <tr>
                                <th scope="row">{{usuario?.idUsuario}}</th>
                                <td>{{usuario?.nome}}</td>
                                <td>{{usuario?.tipoUsuario}}</td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a [routerLink]="['/administrativo/usuarios/editar/', usuario.idUsuario]" class="btn btn-warning btn-sm" placement="top" ngbTooltip="Editar usuário"><i class="fas fa-user-edit"></i></a>
                                        <button type="button" [disabled]="acaoBloqueada" class="btn btn-danger btn-sm" placement="top" ngbTooltip="Desativar usuário"><i class="fas fa-trash-alt"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </ng-container>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
