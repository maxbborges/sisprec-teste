
<div class="modal-header">
    <h5 class="modal-title">Confirmar Envio</h5>
</div>
<div class="modal-body">
    <div class="row">
        <div class="col-12">
            <label><b>Mês: </b></label>&nbsp;&nbsp;
            <label>{{escreveMes(mesExercicio)}}</label>
        </div>
        <div class="col-12">
            <label><b>Ano: </b></label>&nbsp;&nbsp;
            <label>{{anoExercicio}}</label>
        </div>
        <div class="col-12">
            <label><b>Federação: </b></label>&nbsp;&nbsp;
            <label>{{getNomeFederacao(usuarioLogado.idFiliacao)}}</label>
        </div>
        <div class="col-12">
            <label><b>Tipo: </b></label>&nbsp;&nbsp;
            <label>{{getNomeTipo(idTipo)}}</label>
        </div>
        <div class="col-12">
            <label><b>Nome do Documento: </b></label>&nbsp;&nbsp;
            <label>{{getNomeDocumento(idNomeDocumento)}}</label>
        </div>
    </div>
    <div class="row m-3" *ngIf="!getIsPresidente()">
        <div class="col-12">
            <button type="button" class="btn btn-primary-outline" style="width:100%;"
                (click)="gerarFluxoCaixa(true)"
                [disabled]="isLoading">Visualizar Relatório</button>
        </div>
    </div>
    <!-- Baixar para Coordenador/Federação -->
    <div class="row m-3" *ngIf="!getIsPresidente()">
        <div class="col-12">
            <button type="button" class="btn btn-info" style="width:100%;"
                (click)="gerarFluxoCaixa(false)"
                [disabled]="isLoading">Baixar Relatório</button>
        </div>
    </div>
    <!-- Baixar para Presidente -->
    <div class="row m-3" *ngIf="getIsPresidente()">
        <div class="col-12">
            <a *ngIf="idArquivo !== null" [href]="urlDownload + idArquivo"
                class="btn btn-info" style="width:100%;"
                placement="top" [ngbTooltip]="'Baixar arquivo ' + getNomeDocumento(idNomeDocumento)" (click)="isBaixou = true; $event.stopPropagation();">
                <i class="fas fa-file-download"></i>&nbsp;&nbsp;Baixar Relatório
            </a>
        </div>
    </div>
    <div class="row" *ngIf="getIsPresidente()">
        <div class="col-12">
            <label><b>Análise:</b></label>
        </div>
        <form [formGroup]="form">
            <div class="form-group col-md-12">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="radioAnalise" id="rndTipo1"
                        formControlName="radioAnalise" value="true" (change)="mudaTipoColaborador($event)" autocomplete="off">
                    <label class="form-check-label" for="rndTipo1">Aprovado</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="radioAnalise" id="rndTipo2"
                        formControlName="radioAnalise" value="false" (change)="mudaTipoColaborador($event)" autocomplete="off">
                    <label class="form-check-label" for="rndTipo2">Retornar para ajustes</label>
                </div>
            </div>
            <div class="form-group col-md-12" *ngIf="isTemMotivo">
                <label for="motivo" class="form-label">Motivo:</label><br>
                <textarea name="motivo" id="motivo" formControlName="motivo" style="width: 100%;"
                    class="form-control" cols="35" rows="3"></textarea>
            </div>
        </form>
    </div>
    <div class="row">
        <div class="col-12" *ngIf="getIsPresidente() == false">
            <label>Tem certeza que deseja enviar o relatório de Fluxo de Caixa?</label><br>
            <label>Após esta ação, o relatório será enviado para Análise pelo <strong>Presidente da Federação</strong></label><br>
        </div>
        <div class="col-12" *ngIf="getIsPresidente()">
            <label *ngIf="isTemMotivo == false">Tem certeza que deseja enviar o relatório de Fluxo de Caixa? Após esta ação, a prestação de contas será enviada para análise automaticamente.</label><br>
            <label *ngIf="isTemMotivo">Tem certeza que deseja retornar o relatório de Fluxo de Caixa para ajustes? Após o reenvio, ele precisará ser analisado novamente.</label><br>
        </div>
    </div>
</div>
<div class="modal-footer botoes">
    <button type="button" (click)="close()" class="btn btn-danger" [disabled]="isLoading">Cancelar</button>
    <button *ngIf="getIsPresidente() == false" type="button" [disabled]="!isBaixou || isLoading" (click)="cadastrarArquivo(true)" class="btn btn-primary">Confirmar</button>
    <button *ngIf="getIsPresidente()" type="button" [disabled]="!isBaixou || isLoading" (click)="salvarAnalise()" class="btn btn-primary">Confirmar</button>
</div>
