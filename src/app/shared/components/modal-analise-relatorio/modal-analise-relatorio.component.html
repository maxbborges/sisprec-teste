
<div class="container my-4">
  <form [formGroup]="formAnalise" (submit)="salvar()">
    <div class="dados-basicos" *ngIf="!visualizacao" style="margin-bottom: 24px;">
      <div><strong>Federação:</strong> {{dados?.federacao}}</div>
      <div><strong>Data:</strong> {{dados?.dataInicio | date:"dd/MM/yyyy"}} - {{dados?.dataFim | date:"dd/MM/yyyy"}}</div>
      <div><strong>Nome:</strong> {{dados?.nome}}</div>
      <div><strong>E-mail:</strong> {{dados?.email}}</div>
    </div>
    <div class="botoes row" *ngIf="!visualizacao">
      <div class="col-12" style="margin-bottom: 12px;">
        <button type="button" class="btn btn-outline-info" style="width:100%" [routerLink]="['/viagens/visualizar-relatorio/'+ dados?.idRelatorioViagens]">Visualizar Relatório</button>
      </div>
      <div class="col-12" style="margin-bottom: 12px;">
        <button type="button" class="btn btn-info" style="width:100%" (click)="realizarDownload(idRelatorio)">Baixar Relatório</button>
      </div>
    </div>
    <div class="form-group" *ngIf="!visualizacao">
      <div>
        <strong>Análise</strong>
      </div>
      <div *ngFor="let analise of indicadorAnalise">
        <div *ngIf="analise.sigla != 'ReanaliseRelatorio'" class="form-check" style="padding-left: 0;">
          <input type="radio" name="idAnalise" formControlName="idAnalise" [id]="analise.idIndicador" [value]="analise.idIndicador">
          <label class="form-check-label" style="padding-left: 2px;" [for]="analise.idIndicador">
            {{analise.nome}}
          </label>
        </div>
      </div>
    </div>
    <div class="form-group" *ngIf="visualizacao || showObservacoes">
      <label for="observacoes" class="form-label">Observações</label>
      <textarea formControlName="observacoes" name="observacoes" id="observacoes" class="form-control"></textarea>
    </div>
  </form>
</div>

<div *ngIf="!visualizacao" class="modal-footer botoes">
    <button type="button" (click)="close()" class="btn btn-danger">
        <i class="pi pi-chevron-left"></i>
        Cancelar
    </button>

     <button type="button" (click)="salvar()" class="btn btn-primary" [disabled]="formAnalise.invalid">
        Salvar
    </button>
</div>

<div *ngIf="visualizacao" class="modal-footer botoes">
     <button type="button" (click)="close()" class="btn btn-primary" style="padding-left: 30px; padding-right: 30px;">
        OK
    </button>
</div>
