
<div class="modal-header">
    <h5 class="modal-title">{{titulo}}</h5>
</div>
<div class="modal-body">
    <div>
        <div class="form-group" *ngIf="getIsMotivo()">
            <label>Motivo:</label>
            <input type="text" class="form-control" [value]="motivo" [disabled]="true">
        </div>

        <div class="form-group">
            <label>Observações:</label>
            <textarea class="form-control" [value]="observacao" [disabled]="true"></textarea>
        </div>

        
    </div>
    
</div>
<div class="modal-footer botoes">
    <button type="button" (click)="close()" class="btn btn-danger">>
        <i class="pi pi-chevron-left"></i> Voltar
    </button>
</div>
