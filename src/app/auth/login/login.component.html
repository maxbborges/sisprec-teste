<div class="row">
        <div class="offset-md-2 col-md-8 mt-3 d-flex justify-content-center">
            <img src="assets/img/logo.png" class="img-fluid" width="500" alt="Logo Despoluir" />
        </div>
    </div>

<div class="offset-md-2 col-md-8 mt-3">
    <div class="card shadow-lg">
        <h3 class="card-header bg-success text-white"><i class="fas fa-sign-in-alt"></i>&nbsp;&nbsp;Login</h3>
        <div class="card-body">
            <form class="form-signin" [formGroup]="formLogin" novalidate (ngSubmit)="realizarLogin()">
                <div class="form-group row">
                    <div class="alert alert-danger alert-dismissible fade show" role="alert" *ngIf="erro">
                        {{ msg }}
                        <button type="button" (click)="erro=false" class="close" data-dismiss="alert"
                            aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <!-- <p-messages [(value)]="msgs"></p-messages> -->
                    </div>
                </div>

                <div class="form-group row espacamento">
                    <div class="col-sm-12">
                        <label class="sr-only" for="usuario">Usuário</label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fas fa-id-card"></i>
                                </div>
                            </div>
                            <input type="text" formControlName="usuario" autocomplete="off" id="usuario"
                                class="form-control" placeholder="joaosilva@sestsenat.org.br">
                        </div>
                    </div>
                </div>

                <div class="form-group row espacamento">
                    <div class="col-sm-12">
                        <label class="sr-only" for="senha">Senha</label>
                        <div class="input-group mb-2">
                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fas fa-key"></i>
                                </div>
                            </div>
                            <input type="password" id="senha" formControlName="senha" autocomplete="off"
                                class="form-control" placeholder="Senha" required="">
                        </div>
                        <label class="instrucoes">A senha deve respeitar letras maiúsculas e minúsculas</label>
                    </div>
                </div>

                <!-- Exibe somente em resoluções maiores - Inicio -->
                <div class="row">
                    <div class="col-lg-12">
                        <button [disabled]="!formLogin.valid" class="btn btn-block btn-primary w-100" type="submit">
                            <!--<i class="fas fa-sign-in-alt"></i>-->Entrar</button>
                    </div>
                    <div class="recuperar-senha">
                      <a [routerLink]="['/auth/recuperar-senha']">Recuperar senha</a>
                    </div>
                </div>
                <!-- Exibe somente em resoluções maiores - Fim -->
            </form>
        </div>
    </div>
</div>
