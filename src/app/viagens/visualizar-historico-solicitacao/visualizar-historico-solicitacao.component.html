<div class="card shadow mb-3">
  <h3 class="card-header bg-primary text-white">
    Histórico de Solicitações
  </h3>
  <div class="card-body">
    <form [formGroup]="formVisualizar" (submit)="pesquisar()">
      <!-- campos do formulário -->
      <div class="row">
        <div class="col-12 col-md-6 col-lg-2">
          <div class="form-group">
            <label for="dataInicial">Data Inicial</label>
            <input formControlName="dataInicial" type="date" name="dataInicial" id="dataInicial" class="form-control" [class.is-invalid]="(submited || f.dataInicial.touched) && f.dataInicial.invalid">
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-2">
          <div class="form-group">
            <label for="dataFinal">Data Final</label>
            <input formControlName="dataFinal" type="date" name="dataFinal" id="dataFinal" class="form-control" [class.is-invalid]="(submited || f.dataFinal.touched) && f.dataFinal.invalid">
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-8">
          <div class="form-group">
            <label for="nome">Autor</label>
            <input formControlName="nome" type="text" name="nome" id="nome"class="form-control" [disabled]="true">
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12 col-md-6 col-lg-2">
          <button type="button" class="btn btn-outline-danger" (click)="voltar()" style="width: 100%;">
            Voltar
          </button>
        </div>
        <div class="col-12 col-md-6 col-lg-2">
          <button type="button" class="btn btn-success" (click)="baixarPdf()" style="width: 100%;">
            Baixar PDF
          </button>
        </div>
        <div class="col-12 col-md-6 col-lg-8">
          <div class="row" style="justify-content: right;">
            <div class="col-12 col-lg-4">
              <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fas fa-search"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="row">
      <div class="col-12">
        <table class="table table-hover table-striped table-sm">
          <thead>
            <tr>
              <th scope="col">Data</th>
              <th scope="col">Autor</th>
              <th scope="col">Status</th>
              <th scope="col">Observações</th>
            </tr>
          </thead>
          <tbody>
            <ng-container *ngFor="let rv of resultadoPesquisaFiltrado">
              <tr>
                  <td>{{rv.dataAnalise | date:'dd/MM/yyyy HH:mm'}}</td>
                  <td>{{rv.nomeUsuarioAnalise}}</td>
                  <td>{{rv.status}}</td>
                  <td>{{rv.justificativa}}</td>
              </tr> 
            </ng-container>
            <ng-container *ngIf="carregando">
                <tr>
                    <td colspan="6">
                        <div class="mt-2">
                          <app-loading-div mensagem="Carregando histórico..."></app-loading-div>
                        </div>
                    </td>
                </tr>
            </ng-container>
            <ng-container *ngIf="msg">
              <tr>
                <td colspan="6">
                  <div class="alert alert-info">{{msg}}</div>
                </td>
              </tr>
            </ng-container>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
